# ==== Sunucu ====
# Render PORT env degiskenini otomatik saglar; lokalde 8081 kullanilir
server.port=${PORT:8081}

# ==== PostgreSQL ====
# Render'da env degiskenleri (render.yaml / dashboard) ile doldurulur.
# Lokalde calistirmak icin varsayilan localhost degerleri devreye girer.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:modunubul_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

# ==== Hibernate ====
# Entity siniflarina bakarak tablolari otomatik olusturur/gunceller
spring.jpa.hibernate.ddl-auto=update
# SQL sorgularini konsola yazar (gelistirme icin)
spring.jpa.show-sql=true
