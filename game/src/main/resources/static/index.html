<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Modunu Bul</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        /* Kağıt dokusu hissi veren arka plan ve genel font ayarı */
        body {
            font-family: 'Kalam', cursive;
            background-color: #f4efe6;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            color: #2c3e50;
            padding: 20px;
            font-size: 1.2rem;
        }

        /* Marker kalemle yazılmış gibi duran başlık */
        h1 {
            font-family: 'Permanent Marker', cursive;
            color: #d35400;
            transform: rotate(-2deg);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        /* El çizimi gibi duran düzensiz kenarlıklı çetele kutusu */
        .scoreboard {
            border: 3px solid #34495e;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            padding: 15px; width: 250px; margin-bottom: 20px;
            background: #fff; box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .table-area {
            background-color: transparent; padding: 10px; margin-top: 20px;
        }

        .cards-container {
            display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px; margin-top: 10px;
        }

        /* POLAROID KART TEMEL TASARIMI */
        .polaroid {
            background: white;
            padding: 10px 10px 35px 10px; /* Alt boşluk polaroid görünümü verir */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 2px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }

        /* Kartın üzerine gelince düzleşip havaya kalkması */
        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) !important;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* Kartlara rastgeleymiş gibi duran eğiklikler veriyoruz */
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(3n) { transform: rotate(5deg); }

        .polaroid-img { width: 140px; height: 140px; object-fit: cover; }
        .polaroid-img-small { width: 120px; height: 120px; object-fit: cover; }

        /* KAPALI KART TASARIMI */
        .card-back {
            width: 140px; height: 140px;
            background: repeating-linear-gradient(45deg, #d35400, #d35400 10px, #e67e22 10px, #e67e22 20px);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: bold;
            border: 2px solid #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .countdown-text {
            font-family: 'Permanent Marker', cursive;
            font-size: 50px; color: #c0392b; text-align: center; margin: 20px 0;
            animation: pulse 0.5s infinite alternate; text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Kağıt bant gibi duran oy verme butonu */
        .vote-btn {
            margin-top: 15px; background: #f1c40f; padding: 5px 15px;
            border: none; cursor: pointer; font-family: 'Kalam', cursive;
            font-size: 1.1rem; font-weight: bold; transform: rotate(-2deg);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        .vote-btn:hover { background: #f39c12; transform: scale(1.1) rotate(0deg); }

        /* Durum cümlesinin tasarımı */
        #situation-display {
            font-size: 1.8rem; color: #2980b9;
            background: rgba(255, 255, 255, 0.6); padding: 10px 15px;
            border-radius: 10px; display: inline-block;
        }
        /* --- MOBİL UYUMLULUK SİHRİ --- */
@media screen and (max-width: 600px) {
    body { padding: 10px; font-size: 1rem; }

    /* Polaroidleri mobilde biraz küçültüyoruz */
    .polaroid {
        width: 100px; padding: 5px 5px 25px 5px;
    }
    .polaroid-img { width: 90px; height: 90px; }
    .card-back { width: 90px; height: 90px; font-size: 24px; }

    /* Masadaki kartları da küçültüyoruz */
    .polaroid-img-small { width: 80px; height: 80px; }

    /* Geri sayım yazısını küçültüyoruz */
    .countdown-text { font-size: 28px; }

    /* Çetele tablosunu tam genişlik yapıyoruz */
    .scoreboard { width: 90%; }
}
    </style>
</head>
<body>
<h1>Modunu Bul!</h1>

<div id="setup-screen">
    <button onclick="createRoom()" class="vote-btn">Oda Kur</button>
    <br><br>
    <input type="text" id="room-code" placeholder="Oda Kodu" style="padding: 5px; font-family: 'Kalam';">
    <input type="text" id="player-name" placeholder="Oyuncu Adı (örn: ali)" style="padding: 5px; font-family: 'Kalam';">
    <button onclick="joinRoom()" class="vote-btn" style="background: #2ecc71; color: white;">Odaya Katıl</button>
</div>

<div id="game-screen" style="display:none;">
    <h2 id="room-display"></h2>

    <div class="scoreboard" id="scoreboard">
        <h3 style="margin-top:0; border-bottom: 2px dashed #ccc;">Retro Çetele</h3>
        <div id="scores-display"></div>
    </div>

    <h3 id="situation-display"></h3>

    <div class="table-area" id="table-area">
        <h3 style="color: #7f8c8d;">Masadaki Kartlar</h3>
        <div id="countdown-area"></div>
        <div id="table-display" class="cards-container">Henüz kart atılmadı.</div>
    </div>

    <div style="margin-top: 40px; border-top: 2px dashed #bdc3c7; padding-top: 20px;">
        <h3 style="color: #7f8c8d;">Elimdeki Kartlar</h3>
        <div id="hand-display" class="cards-container"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
